global:
  scrape_interval: 15s

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ec2-node'
    static_configs:
      - targets: ['<public-ip-ec2-node>:9100']

  - job_name: 'python-flask-app'
    static_configs:
      - targets: ['<public-ip-python-flask-app>:5000']
